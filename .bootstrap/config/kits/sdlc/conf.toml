# SDLC Kit Configuration
# Bump `version` when any blueprint or script changes.
# Migration is triggered by kit-level version drift only.

version = 5
slug = "sdlc"
name = "Cypilot SDLC Kit"

[whatsnew.2]
summary = "Centralized kit versioning via conf.toml"
details = """\
- Removed per-blueprint `version` and `kit` fields from `@cpt:blueprint` TOML blocks
- Single kit-level version in conf.toml drives all migration decisions
- PR-REVIEW blueprint: migrated config references from pr-review.json → pr-review.toml
- Simplified blueprint TOML: only `artifact`, `codebase`, `toc` fields remain\
"""

[whatsnew.3]
summary = "Named marker syntax for stable three-way merge"
details = """\
- All markers upgraded from legacy `@cpt:TYPE` to named `@cpt:TYPE:ID` syntax
- Examples: `@cpt:heading` → `@cpt:heading:prd-risks`, `@cpt:rule` → `@cpt:rule:requirements-semantic-10`
- Enables stable identity-based merge across kit versions (no more positional guessing)
- Legacy markers in user configs are auto-upgraded during migration\
"""

[whatsnew.4]
summary = "Interactive migration with per-marker diffs"
details = """\
- Migration now shows color-coded unified diffs for each changed marker
- Interactive prompt per blueprint file: y/N/all (approve remaining)
- Customized markers highlighted separately with your version vs reference
- Syntax-only upgrades (legacy → named) auto-applied without prompting\
"""

[whatsnew.5]
summary = "Fix legacy checklist_epilogue marker in CODEBASE blueprint"
details = """\
- Renamed `@cpt:checklist_epilogue` → `@cpt:checklist_epilogue:default` for stable merge identity\
"""
